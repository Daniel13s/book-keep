services:
  api:
    build: .
    container_name: catalogo_livros_api
    ports:
      - "3333:3333"
    environment:
      SECRET_KEY: seu_segredo_eba
      DATABASE_URL: postgresql://johndoe:randompassword@db:5432/mydb?schema=public
      REDIS_URL: redis://cache:6379
    volumes:
      - ./prisma:/usr/app/prisma
    depends_on:
      - db
      - cache
  db:
    image: postgres
    environment:
      - POSTGRES_USER=johndoe
      - POSTGRES_PASSWORD=randompassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"